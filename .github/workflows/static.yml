name: Deploy Vite site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4 # V4 es compatible, pero necesita Node actualizado abajo

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24 # Forzamos explícitamente 24 para evitar el conflicto de "forzado"
          cache: 'npm'
          cache-dependency-path: webpage/package-lock.json

      - name: Install dependencies
        # Usamos --legacy-peer-deps por si alguna librería de lucide o react aún no se actualiza a Node 24
        run: npm install --legacy-peer-deps
        working-directory: webpage

      - name: Build
        # CI=false evita que warnings de TypeScript/Lint rompan el despliegue
        # NODE_OPTIONS ayuda si hay problemas de memoria con la nueva versión de Node
        run: |
          export CI=false
          npm run build
        working-directory: webpage
        env:
          VITE_GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: webpage/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
