name: Deploy Vite site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Soluciona el warning: Forzamos el uso de Node 24 para las acciones internas
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24 # Actualizamos a la versión recomendada para 2026
          cache: 'npm'
          cache-dependency-path: webpage/package-lock.json
          
      - name: Install dependencies
        run: npm install
        working-directory: webpage
        
      - name: Build
        # Usamos CI=false para evitar que el build falle por warnings de linter o tipos
        run: CI=false npm run build 
        working-directory: webpage
        env:
          VITE_GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: webpage/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
