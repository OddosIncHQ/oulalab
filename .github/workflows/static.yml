name: Deploy Vite site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24  # Sincronizamos con el runner de 2026
          cache: 'npm'
          cache-dependency-path: webpage/package-lock.json

      - name: Install dependencies
        # Importante: React 19 y Node 24 a veces requieren resolución estricta
        run: npm ci || npm install
        working-directory: webpage

      - name: Build
        # CI=false por si hay algún warning en el CSS o assets de Vite
        run: npx --node-options="--max-old-space-size=4096" vite build
        working-directory: webpage
        env:
          VITE_GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CI: false 

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: webpage/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
